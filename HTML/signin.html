<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTIZKIDDIESWORLD - Sign In</title>

<link rel="stylesheet" href="../CSS/signin.css">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>

<body>

<div class="container">

<div class="login-box">

<div class="logo-section">

<img src="../image/WhatsApp Image 2026-06-20 at 2.26.59 AM.jpeg" alt="OTIZKIDDIESWORLD Logo">

<h1>OTIZKIDDIESWORLD</h1>

<p>Trendy, Premium, Affordable & Wholesome</p>

</div>

<form id="loginForm">

<div class="input-group">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter your email"
required>

</div>

<div class="input-group">

<label>Password</label>

<div class="password-container">

<input
type="password"
id="password"
placeholder="Enter your password"
required>

<i class="fas fa-eye" id="togglePassword"></i>

</div>

</div>

<div class="options">

<label>
<input type="checkbox">
Remember Me
</label>

<a href="#" id="forgotPasswordLink">Forgot Password?</a>

</div>

<button type="submit">
  Sign In
</button>

<div class="signup-link">

Don't have an account?

<a href="../HTML/signup.html">
Create Account
</a>

</div>

</form>

</div>

</div>

<script type="module" src="../JS/signin.js"></script>

</body>
</html>
<div id="recaptcha-container" style="display:none"></div>
